        perl -0pi -e 's/foreach \(\$files as \$file\) \{\n            \$cmd\[\] = \$file;\n        \}/\$fileList = \$this->tempFile . "-file-list";\n        file_put_contents(\$fileList, implode(PHP_EOL, \$files));\n        \$cmd[] = "--file-list=" . \$fileList;/s' "$GITHUB_WORKSPACE/m-ci/src/Command/CodeCheckerCommand.php"
        grep -q -- '--file-list' "$GITHUB_WORKSPACE/m-ci/src/Command/CodeCheckerCommand.php" && echo "codechecker patched to use --file-list" || { echo "codechecker --file-list patch FAILED - check moodle-plugin-ci upstream"; exit 1; }
        # END OF WORKAROUND 24/07/2026

        # WORKAROUND 17/04/2025: The following code is a workaround for the "File is stale and needs to be rebuilt" error
        # This occurs when AMD modules import Moodle core dependencies
        # See issue: https://github.com/moodlehq/moodle-plugin-ci/issues/350
